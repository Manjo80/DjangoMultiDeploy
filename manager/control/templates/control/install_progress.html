{% extends "control/base.html" %}
{% block title %}Installation läuft — {{ project }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-9">

<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">
      <i class="bi bi-terminal me-2"></i>
      Installation: <strong>{{ project }}</strong>
    </h5>
    <span id="status-badge" class="badge bg-warning">läuft…</span>
  </div>
  <div class="card-body p-0">
    <div class="terminal-box" id="terminal"></div>
  </div>
  <div class="card-footer d-flex justify-content-between align-items-center">
    <span class="text-muted small" id="status-text">Warte auf Ausgabe…</span>
    <div id="action-buttons" class="d-none">
      <a href="{% url 'project_detail' project %}" class="btn btn-primary">
        <i class="bi bi-gear me-1"></i> Projekt verwalten
      </a>
      <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Dashboard</a>
    </div>
  </div>
</div>

</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const terminal   = document.getElementById('terminal');
const statusBadge = document.getElementById('status-badge');
const statusText  = document.getElementById('status-text');
const actionBtns  = document.getElementById('action-buttons');
const pollUrl     = '{% url "install_stream" log_name %}';

let offset    = 0;
let lineCount = 0;
let idleTicks = 0;       // Polls ohne neue Daten
let errTicks  = 0;       // aufeinanderfolgende Fehler
let timer     = null;

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function colorLine(text) {
  if (text.includes('❌') || /FEHLER|ABBRUCH/i.test(text)) return '#f85149';
  if (text.includes('✅') || /FERTIG/i.test(text))          return '#3fb950';
  if (text.includes('⚠️') || /WARNUNG/i.test(text))         return '#d29922';
  if (/📦|🔧|🐍|📥|🔄/.test(text))                         return '#79c0ff';
  return null;
}

function appendLines(lines) {
  for (const text of lines) {
    if (!text.trim()) continue;
    const div = document.createElement('div');
    div.textContent = text;
    const c = colorLine(text);
    if (c) div.style.color = c;
    terminal.appendChild(div);
    lineCount++;
  }
  terminal.scrollTop = terminal.scrollHeight;
}

function setDone() {
  clearTimeout(timer);
  statusBadge.textContent = 'Fertig ✅';
  statusBadge.className   = 'badge bg-success';
  statusText.textContent  = `Installation abgeschlossen (${lineCount} Zeilen).`;
  actionBtns.classList.remove('d-none');
}

function setError(msg) {
  clearTimeout(timer);
  statusBadge.textContent = 'Fehler ❌';
  statusBadge.className   = 'badge bg-danger';
  statusText.textContent  = msg;
}

async function poll() {
  try {
    const res = await fetch(`${pollUrl}?offset=${offset}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    errTicks = 0;   // Verbindung OK

    if (data.waiting) {
      // Log-Datei noch nicht vorhanden
      idleTicks++;
      statusText.textContent = 'Warte auf Script-Start…';
      if (idleTicks > 60) { setError('Script hat nicht gestartet (Timeout).'); return; }
    } else if (data.lines && data.lines.length > 0) {
      idleTicks = 0;
      offset = data.offset;
      appendLines(data.lines);
      statusText.textContent = `${lineCount} Zeilen empfangen…`;
    } else {
      idleTicks++;
      offset = data.offset;
      // Timeout nach ~5 Minuten ohne neue Ausgabe
      if (idleTicks > 300) { setError('Keine Ausgabe seit 5 Minuten — prüfe systemctl status.'); return; }
    }

    if (data.done) { setDone(); return; }

  } catch (e) {
    errTicks++;
    statusText.textContent = `Verbindungsfehler (Versuch ${errTicks})…`;
    if (errTicks > 10) { setError('Verbindung dauerhaft unterbrochen.'); return; }
  }

  timer = setTimeout(poll, 1000);
}

poll();
</script>
{% endblock %}
