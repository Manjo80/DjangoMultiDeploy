<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — DjangoMultiDeploy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; color: #e6edf3; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    label, h4, p { color: #e6edf3; }
    .card { background: #161b22; border: 1px solid #30363d; max-width: 380px; width: 100%; }
    .card-header { background: #21262d; border-bottom: 1px solid #30363d; }
    .form-control { background: #0d1117; border-color: #30363d; color: #e6edf3; }
    .form-control:focus { background: #0d1117; border-color: #58a6ff; color: #e6edf3; box-shadow: 0 0 0 0.2rem rgba(88,166,255,0.2); }
    .btn-primary { background: #238636; border-color: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; color: #fff; }
  </style>
</head>
<body>
<div class="card shadow-lg">
  <div class="card-header text-center py-3">
    <h4 class="mb-0"><i class="bi bi-server"></i> DjangoMultiDeploy</h4>
  </div>
  <div class="card-body p-4">
    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Benutzername</label>
        <input type="text" name="username" class="form-control" autofocus required autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label">Passwort</label>
        <input type="password" name="password" class="form-control" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Anmelden
      </button>
    </form>
  </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</body>
</html>
