<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DjangoMultiDeploy Manager{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { color: #58a6ff !important; font-weight: 700; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #21262d; border-bottom: 1px solid #30363d; }
    .badge-active   { background: #238636; }
    .badge-inactive { background: #6e7681; }
    .badge-failed   { background: #da3633; }
    .badge-unknown  { background: #9e6a03; }
    pre.log-output {
      background: #010409; border: 1px solid #30363d; color: #58a6ff;
      font-size: 0.78rem; max-height: 600px; overflow-y: auto;
      padding: 1rem; border-radius: 6px;
    }
    .terminal-box {
      background: #010409; border: 1px solid #30363d; color: #3fb950;
      font-family: monospace; font-size: 0.80rem;
      height: 500px; overflow-y: auto; padding: 1rem; border-radius: 6px;
    }
    .form-control, .form-select {
      background: #0d1117; border-color: #30363d; color: #e6edf3;
    }
    .form-control:focus, .form-select:focus {
      background: #0d1117; border-color: #58a6ff; color: #e6edf3;
      box-shadow: 0 0 0 0.2rem rgba(88,166,255,0.2);
    }
    .btn-primary   { background: #238636; border-color: #238636; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
    .btn-danger    { background: #da3633; border-color: #da3633; }
    .table         { color: #e6edf3; }
    .table-dark    { --bs-table-bg: #0d1117; }
    a              { color: #58a6ff; }
    a:hover        { color: #79c0ff; }
    .text-muted    { color: #8b949e !important; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'dashboard' %}">
      <i class="bi bi-server"></i> DjangoMultiDeploy
    </a>
    <div class="ms-auto d-flex gap-2">
      <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-grid"></i> Dashboard
      </a>
      <a href="{% url 'install_form' %}" class="btn btn-sm btn-outline-success">
        <i class="bi bi-plus-circle"></i> Neues Projekt
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid py-4">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
