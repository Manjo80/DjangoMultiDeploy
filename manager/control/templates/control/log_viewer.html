{% extends "control/base.html" %}
{% block title %}Logs — {{ name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4><i class="bi bi-file-text me-2"></i>Logs: {{ name }}</h4>
  {% if is_manager %}
  <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-secondary">← Zurück</a>
  {% else %}
  <a href="{% url 'project_detail' name %}" class="btn btn-sm btn-outline-secondary">← Zurück</a>
  {% endif %}
</div>

<div class="card mb-3">
  <div class="card-body">
    <form method="get" class="row g-2 align-items-end">
      <div class="col-auto">
        <label class="form-label">Log-Typ</label>
        <select name="type" class="form-select form-select-sm" id="log-type-sel">
          <option value="journal"      {% if log_type == 'journal' %}selected{% endif %}>systemd Journal</option>
          <option value="nginx_access" {% if log_type == 'nginx_access' %}selected{% endif %}>nginx Access</option>
          <option value="nginx_error"  {% if log_type == 'nginx_error' %}selected{% endif %}>nginx Error</option>
        </select>
      </div>
      <div class="col-auto">
        <label class="form-label">Zeilen</label>
        <select name="lines" class="form-select form-select-sm" id="log-lines-sel">
          <option value="50"  {% if lines == 50  %}selected{% endif %}>50</option>
          <option value="100" {% if lines == 100 %}selected{% endif %}>100</option>
          <option value="200" {% if lines == 200 %}selected{% endif %}>200</option>
          <option value="500" {% if lines == 500 %}selected{% endif %}>500</option>
        </select>
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-clockwise"></i> Aktualisieren
        </button>
      </div>
    </form>
  </div>
</div>

<pre class="log-output" id="log-content">{{ logs }}</pre>

<script nonce="{{ csp_nonce }}">
// Auto-scroll to bottom
const el = document.getElementById('log-content');
el.scrollTop = el.scrollHeight;

// Auto-submit form when selects change
['log-type-sel', 'log-lines-sel'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', function () { this.form.submit(); });
});
</script>
{% endblock %}
